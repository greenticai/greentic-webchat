name: Codex Security Fix
# Moved off pull_request onto a nightly schedule. See plans/binary-bifurcation.md
# Phase A.4 (Wave 3). Manual runs remain available via workflow_dispatch.

on:
  schedule:
    - cron: "43 5 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to scan and patch (only for manual run)"
        required: false
        default: ""
      max_alerts:
        description: "Maximum open alerts per source to include"
        required: true
        default: "20"
permissions:
  contents: write
  pull-requests: write
  security-events: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-fix:
    # Fork-PR guard kept defense-in-depth; no-op now pull_request is removed.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    uses: greenticai/.github/.github/workflows/codex-security-fix.yml@main
    with:
      branch: ${{ github.event.inputs.branch || '' }}
      max_alerts: ${{ github.event.inputs.max_alerts || '20' }}
    secrets: inherit
